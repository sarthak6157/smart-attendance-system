<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Smart Attendance System</title>
    <link rel="stylesheet" href="login_page.css">
    <script src="api.js"></script>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <h1>Smart Attendance</h1>
            <p>Enter your credentials to continue</p>
            
            <form id="loginForm">
                <div class="input-group">
                    <label for="username">Enrollment No / ID</label>
                    <input type="text" id="username" required placeholder="e.g. TCA2559184">
                </div>
                
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>

                <div id="errorMessage" class="error-msg" style="display: none; color: red; margin-bottom: 10px;"></div>

                <button type="submit" id="loginBtn">Login</button>
            </form>
            
            <div class="login-footer">
                <p>New student? <a href="registration_page.html">Register here</a></p>
            </div>
        </div>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        const errorMessage = document.getElementById('errorMessage');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            // Show loading state
            const loginBtn = document.getElementById('loginBtn');
            loginBtn.innerText = 'Authenticating...';
            loginBtn.disabled = true;
            errorMessage.style.display = 'none';

            try {
                // We use the LIVE_BACKEND_URL defined in your api.js
                const response = await fetch(`${LIVE_BACKEND_URL}/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: new URLSearchParams({
                        'username': username,
                        'password': password
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    // 1. Save Session Data
                    localStorage.setItem('token', data.access_token);
                    localStorage.setItem('user_role', data.role);
                    localStorage.setItem('user_name', data.full_name);
                    localStorage.setItem('user_id', data.id);

                    // 2. REDIRECTION LOGIC
                    console.log("Login successful. Role:", data.role);

                    if (data.role === 'admin') {
                        window.location.href = 'admin_dashboard.html';
                    } 
                    else if (data.role === 'faculty') {
                        window.location.href = 'faculty_dashboard.html';
                    } 
                    else if (data.role === 'student') {
                        // Check if they need to register their face (187 students you imported)
                        if (data.status === 'facial_required') {
                            window.location.href = 'facial_registration.html';
                        } else {
                            window.location.href = 'student_dashboard.html';
                        }
                    }
                } else {
                    errorMessage.innerText = data.detail || 'Invalid username or password';
                    errorMessage.style.display = 'block';
                    loginBtn.innerText = 'Login';
                    loginBtn.disabled = false;
                }
            } catch (error) {
                console.error('Login error:', error);
                errorMessage.innerText = 'Connection to server failed. Please try again.';
                errorMessage.style.display = 'block';
                loginBtn.innerText = 'Login';
                loginBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
