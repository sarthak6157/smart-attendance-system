<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1" name="viewport"/>
    <title>User Profile | Hybrid Attendance</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@100;300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11.10.7/dist/sweetalert2.min.css" rel="stylesheet"/>
    <link href="style.css" rel="stylesheet"/>
    <link href="user_profile.css" rel="stylesheet"/>
    <script src="api.js"></script>
</head>
<body>
    <nav class="navbar navbar-expand-md navbar-dark" style="background:#9a296a;">
        <div class="container-fluid">
            <button class="btn btn-outline-light d-md-none me-2" data-bs-target="#commonProfileSidebar" data-bs-toggle="collapse" type="button">
                <i class="fa-solid fa-bars"></i>
            </button>
            <a class="navbar-brand fw-bold" href="student_dashboard.html">Account</a>
            <div class="ms-auto d-flex align-items-center">
                <a class="btn btn-light me-2" href="student_dashboard.html">Home</a>
                <div class="dropdown">
                    <button class="btn btn-light dropdown-toggle" data-bs-toggle="dropdown">
                        <i class="fa-solid fa-user me-1"></i> Me
                    </button>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li><a class="dropdown-item" href="user_profile.html">My Profile</a></li>
                        <li><hr class="dropdown-divider"/></li>
                        <li><a class="dropdown-item text-danger" href="#" onclick="logoutUser()">Logout</a></li>
                    </ul>
                </div>
            </div>
        </div>
    </nav>

    <div class="container-fluid">
        <div class="d-flex align-items-stretch">
            <aside class="d-flex flex-column flex-shrink-0 bg-light border-end" style="min-height:100vh;width:240px;">
                <div class="p-3 border-bottom d-flex align-items-center" style="background:#f08e1b;">
                    <a class="text-white fw-bold text-decoration-none" href="student_dashboard.html">Hybrid Attendance</a>
                </div>
                <div class="collapse show" id="commonProfileSidebar">
                    <div class="p-3">
                        <div class="d-flex align-items-center mb-4">
                            <img id="sidebarAvatar" src="https://ui-avatars.com/api/?name=User&background=9a296a&color=fff" class="rounded-circle me-2" style="width:40px;height:40px;object-fit:cover;" alt="avatar"/>
                            <div>
                                <div class="fw-semibold" id="sidebarName">Loading...</div>
                                <small class="text-muted">Profile & Setup</small>
                            </div>
                        </div>
                        <ul class="nav nav-pills flex-column">
                            <li class="nav-item mb-1"><a class="nav-link active" href="user_profile.html"><i class="fa-solid fa-id-badge me-2"></i>Profile</a></li>
                            <li class="nav-item mb-1"><a class="nav-link text-dark" href="#security"><i class="fa-solid fa-shield-halved me-2"></i>Security</a></li>
                            <li class="nav-item mb-1"><a class="nav-link text-dark" href="facial_registration.html"><i class="fa-solid fa-rotate me-2"></i>Facial Registration</a></li>
                            <li class="nav-item mt-3"><a class="nav-link text-danger" href="#" onclick="logoutUser()"><i class="fa-solid fa-right-from-bracket me-2"></i>Logout</a></li>
                        </ul>
                    </div>
                </div>
            </aside>

            <main class="flex-grow-1">
                <div class="container py-3 py-lg-4">
                    <div id="loadingSpinner" class="text-center py-5">
                        <div class="spinner-border text-primary" role="status"></div>
                        <p class="mt-2 text-muted">Fetching profile details...</p>
                    </div>

                    <div id="profileContent" style="display:none;">
                        <div class="page-header mb-4">
                            <div class="d-flex align-items-center gap-2">
                                <h1 class="page-title m-0">User Profile</h1>
                                <span class="badge bg-info text-dark" id="roleBadge">User</span>
                            </div>
                        </div>

                        <div class="card app-card mb-4 shadow-sm">
                            <div class="card-body">
                                <div class="row align-items-center">
                                    <div class="col-md-auto text-center mb-3 mb-md-0">
                                        <img id="avatarImg" src="" class="rounded-circle border shadow-sm" style="width:100px; height:100px; object-fit:cover;" alt="Profile Picture">
                                    </div>
                                    <div class="col text-center text-md-start">
                                        <h3 id="userNameHeading" class="mb-1">Name</h3>
                                        <p id="userEmailSub" class="text-muted mb-0">email@example.com</p>
                                        <p class="small text-secondary mb-0">ID: <span id="userIdSub">---</span></p>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="card app-card mb-4 shadow-sm">
                            <div class="card-header bg-white fw-bold">Personal Information</div>
                            <div class="card-body">
                                <div class="row g-3">
                                    <div class="col-md-6">
                                        <label class="form-label text-muted small uppercase">Full Name</label>
                                        <div id="infoFullName" class="p-2 bg-light rounded border">---</div>
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label text-muted small uppercase">Institutional ID</label>
                                        <div id="infoInstId" class="p-2 bg-light rounded border">---</div>
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label text-muted small uppercase">Email Address</label>
                                        <div id="infoEmail" class="p-2 bg-light rounded border">---</div>
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label text-muted small uppercase">Department</label>
                                        <div id="infoDept" class="p-2 bg-light rounded border">---</div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="card app-card shadow-sm" id="security">
                            <div class="card-header bg-white fw-bold">Change Password</div>
                            <div class="card-body">
                                <form id="passwordForm">
                                    <div class="mb-3">
                                        <label class="form-label">Current Password</label>
                                        <input type="password" id="currentPassword" class="form-control" required>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label">New Password</label>
                                        <input type="password" id="newPassword" class="form-control" required minlength="8">
                                    </div>
                                    <button type="submit" class="btn btn-primary">Update Password</button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11.10.7/dist/sweetalert2.all.min.js"></script>

    <script>
        const API_URL = "https://smart-attendance-api-2dol.onrender.com/api"; 
        const token = localStorage.getItem('access_token');

        // Security Check: Redirect immediately if no token
        if (!token) {
            console.warn("No token found, redirecting to login.");
            window.location.href = 'login_page.html';
        }

        async function fetchProfile() {
            try {
                const response = await fetch(`${API_URL}/auth/me`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (response.status === 401) {
                    console.error("Token expired or invalid.");
                    logoutUser();
                    return;
                }

                if (!response.ok) throw new Error("Could not fetch user data.");

                const user = await response.json();
                renderProfile(user);
            } catch (error) {
                console.error(error);
                Swal.fire("Error", "Failed to load profile. Try again later.", "error");
            }
        }

        function renderProfile(user) {
            const avatar = `https://ui-avatars.com/api/?name=${encodeURIComponent(user.full_name)}&background=9a296a&color=fff`;
            
            document.getElementById('sidebarName').textContent = user.full_name;
            document.getElementById('sidebarAvatar').src = avatar;
            document.getElementById('avatarImg').src = avatar;
            document.getElementById('userNameHeading').textContent = user.full_name;
            document.getElementById('userEmailSub').textContent = user.email;
            document.getElementById('userIdSub').textContent = user.inst_id;
            document.getElementById('roleBadge').textContent = user.role.toUpperCase();

            document.getElementById('infoFullName').textContent = user.full_name;
            document.getElementById('infoInstId').textContent = user.inst_id;
            document.getElementById('infoEmail').textContent = user.email;
            document.getElementById('infoDept').textContent = user.department || "Not Specified";

            document.getElementById('loadingSpinner').style.display = 'none';
            document.getElementById('profileContent').style.display = 'block';
        }

        function logoutUser() {
            localStorage.removeItem('access_token');
            localStorage.removeItem('user_role');
            window.location.href = 'login_page.html';
        }

        document.getElementById('passwordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const current_password = document.getElementById('currentPassword').value;
            const new_password = document.getElementById('newPassword').value;

            try {
                const res = await fetch(`${API_URL}/auth/change-password`, {
                    method: 'POST',
                    headers: { 
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json' 
                    },
                    body: JSON.stringify({ current_password, new_password })
                });

                if (res.ok) {
                    Swal.fire("Success", "Password updated successfully!", "success");
                    e.target.reset();
                } else {
                    const data = await res.json();
                    Swal.fire("Error", data.detail || "Update failed", "error");
                }
            } catch (err) {
                Swal.fire("Error", "Server connection failed", "error");
            }
        });

        // Initialize
        document.addEventListener('DOMContentLoaded', fetchProfile);
    </script>
</body>
</html>
