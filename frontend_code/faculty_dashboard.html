<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Smart Attendance System</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="login_page.css">
    
    <script src="api.js"></script> 
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card shadow-lg border-0">
                    <div class="card-body p-5">
                        <div class="text-center mb-4">
                            <i class="fas fa-user-check fa-3x text-primary mb-3"></i>
                            <h2 class="fw-bold">Smart Attendance</h2>
                            <p class="text-muted">Login to your account</p>
                        </div>

                        <form id="loginForm">
                            <div class="mb-3">
                                <label class="form-label">Enrollment No / ID</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fas fa-id-card"></i></span>
                                    <input type="text" id="username" class="form-control" required placeholder="e.g. TCA2559184">
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Password</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fas fa-lock"></i></span>
                                    <input type="password" id="password" class="form-control" required placeholder="••••••••">
                                </div>
                            </div>

                            <button type="submit" id="loginBtn" class="btn btn-primary w-100 py-2 mt-3 fw-bold">
                                Login <i class="fas fa-sign-in-alt ms-2"></i>
                            </button>
                        </form>

                        <div class="text-center mt-4">
                            <p class="small text-muted">New student? <a href="registration_page.html" class="text-decoration-none">Register here</a></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const usernameInput = document.getElementById('username').value.trim();
            const passwordInput = document.getElementById('password').value;

            loginBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Authenticating...';
            loginBtn.disabled = true;

            try {
                if (typeof LIVE_BACKEND_URL === 'undefined') {
                    throw new Error("Configuration Error: LIVE_BACKEND_URL is not defined in api.js");
                }

                // FIX: Send as JSON and use the key 'credential' to match your auth.py
                const response = await fetch(`${LIVE_BACKEND_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify({ 
                        credential: usernameInput, 
                        password: passwordInput 
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    // Success logic: access data via the 'user' object from TokenResponse
                    localStorage.setItem('token', data.access_token);
                    localStorage.setItem('user_role', data.user.role);
                    localStorage.setItem('user_name', data.user.full_name);
                    localStorage.setItem('user_id', data.user.id);

                    Swal.fire({
                        icon: 'success',
                        title: 'Welcome!',
                        text: `Hello, ${data.user.full_name}`,
                        timer: 1500,
                        showConfirmButton: false
                    }).then(() => {
                        const role = data.user.role;
                        const status = data.user.status;

                        if (role === 'admin') window.location.href = 'admin_dashboard.html';
                        else if (role === 'faculty') window.location.href = 'faculty_dashboard.html';
                        else if (role === 'student') {
                            if (status === 'facial_required') window.location.href = 'facial_registration.html';
                            else window.location.href = 'student_dashboard.html';
                        }
                    });
                } else {
                    // Improved error parsing to avoid [object Object]
                    let errorMsg = "Invalid Credentials";
                    if (data.detail) {
                        errorMsg = typeof data.detail === 'object' ? JSON.stringify(data.detail) : data.detail;
                    }
                    throw new Error(errorMsg);
                }
            } catch (error) {
                console.error("Login Error:", error);
                Swal.fire({
                    icon: 'error',
                    title: 'Login Failed',
                    text: error.message
                });
                loginBtn.innerHTML = 'Login <i class="fas fa-sign-in-alt ms-2"></i>';
                loginBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
